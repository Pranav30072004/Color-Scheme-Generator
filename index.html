<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="color-generator.css" />
</head>
<body>
    <header class="color-pick-container">
     <input type="color" id="color-picker" class="color-picker" />
        <select class="scheme-selector" id="scheme-selector">
            <option value="monochrome">Monochrome</option>
            <option value="monochrome-dark">Monochrome-dark</option>
            <option value="monochrome-light">Monochrome-light</option>
            <option value="Analogic">Analogic</option>
            <option value="complement">Complement</option>
            <option value="analogic-compliment">Analogic-compliment</option>
            <option value="triad">Triad</option>
            <option value="quad">Quad</option>
        </select>
        <button class="scheme-generator-btn" id="scheme-generator-btn">Get color scheme</button>
    </header>

    <main class="color-scheme-container" id="color-scheme-container">
    </main>

<script src="main.js" />
</body>
</html>
